name: 8west-analytics

services:
  postgres:
    image: postgres:17.10-alpine3.23
    restart: unless-stopped
    env_file:
      - /etc/8west-analytics/postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    shm_size: 128mb
    security_opt:
      - no-new-privileges:true

  umami:
    image: docker.umami.is/umami-software/umami:3.1.0
    restart: unless-stopped
    init: true
    env_file:
      - /etc/8west-analytics/umami.env
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/heartbeat >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
    driver: bridge
  backend:
    internal: true

volumes:
  postgres_data:
