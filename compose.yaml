services:
  proxy:
    image: caddy:<PINNED_VERSION>
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend
    depends_on:
      umami:
        condition: service_healthy

  umami:
    image: ${UMAMI_IMAGE}
    restart: unless-stopped
    env_file:
      - /etc/8west-analytics/umami.env
    expose:
      - "3000"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    env_file:
      - /etc/8west-analytics/postgres.env
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    shm_size: 128mb

networks:
  frontend:
  backend:
    internal: true

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
