name: ApexOdds Preflight Verify

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify script
        run: |
          bash -n scripts/apexodds/preflight-analytics-deployment.sh
          sha256sum scripts/apexodds/preflight-analytics-deployment.sh | tee apexodds-preflight.sha256

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: apexodds-preflight-checksum
          path: apexodds-preflight.sha256
          if-no-files-found: error
          retention-days: 7
