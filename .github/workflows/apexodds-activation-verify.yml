name: ApexOdds Activation Verify

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify activation script
        run: |
          set -Eeuo pipefail
          SCRIPT=scripts/apexodds/activate-analytics-production.sh
          bash -n "$SCRIPT"
          grep -Fq 'EXPECTED_TARGET_SHA="2fad7675cb8d07f0590dc1edb432f471913f5680"' "$SCRIPT"
          grep -Fq 'EXPECTED_CURRENT_HEAD="3b538874947a617f3ea94008fab3ed8f5e9d2083"' "$SCRIPT"
          grep -Fq 'EXPECTED_PROPERTY_ID="d1f9c3cd-1115-4037-a679-cea8bf9bd09c"' "$SCRIPT"
          grep -Fq 'rollback()' "$SCRIPT"
          grep -Fq 'persistent-state.tgz' "$SCRIPT"
          sha256sum "$SCRIPT" | tee apexodds-activation.sha256

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: apexodds-activation-checksum
          path: apexodds-activation.sha256
          if-no-files-found: error
          retention-days: 7
